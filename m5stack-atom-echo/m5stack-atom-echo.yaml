substitutions:
  name: m5stack-atom-echo
  friendly_name: M5Stack Atom Echo

packages:
  m5stack.atom-echo-wake-word-voice-assistant: github://esphome/wake-word-voice-assistants/m5stack-atom-echo/m5stack-atom-echo.yaml@main

voice_assistant:
  # id: va
  id: !extend va
  # micro_wake_word:
  # microphone:
  #   microphone: echo_microphone
  #   channels: 0
  #   gain_factor: 4
  # media_player: echo_media_player
  # noise_suppression_level: 2
  # auto_gain: 31dBFS
  on_tts_end:
    - homeassistant.action:
        action: media_player.volume_mute
        data:
          entity_id: ${external_media_player}
          is_volume_muted: "false"
    - homeassistant.action:
        action: media_player.play_media
        data:
          entity_id: ${external_media_player}
          media_content_id: !lambda 'return x;'
          media_content_type: music
          announce: "false"
  on_listening:
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        effect: "Slow Pulse"
    - homeassistant.action:
        action: media_player.volume_mute
        data:
          entity_id: ${external_media_player}
          is_volume_muted: "true"
    - homeassistant.action:
        action: media_player.play_media
        data:
          entity_id: ${external_media_player}
          media_content_id: 'audio-file://one_sec_silence'
          media_content_type: music
          announce: "false"
